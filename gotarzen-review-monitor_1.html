<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>鍋泰暖 — 評論監控系統</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@300;400;500;700&family=Space+Mono:wght@400;700&display=swap');
:root {
  --bg:#0d0f14;--surface:#141720;--surface2:#1c2030;--border:#252c3d;
  --accent:#f59e0b;--accent2:#fcd34d;--blue:#3b82f6;--blue2:#60a5fa;
  --danger:#ef4444;--success:#22c55e;--warn:#f59e0b;
  --text:#e8eaf0;--text2:#94a3b8;--text3:#4a5568;--star:#fbbf24;
  --r:10px;
}
*{margin:0;padding:0;box-sizing:border-box;}
body{background:var(--bg);color:var(--text);font-family:'Noto Sans TC',sans-serif;font-size:14px;min-height:100vh;}
/* LAYOUT */
.app{display:flex;height:100vh;overflow:hidden;}
.sidebar{width:230px;min-width:230px;background:var(--surface);border-right:1px solid var(--border);display:flex;flex-direction:column;}
.logo{padding:18px 16px 14px;border-bottom:1px solid var(--border);}
.logo h1{font-size:15px;font-weight:700;color:var(--accent2);letter-spacing:.05em;}
.logo span{font-size:11px;color:var(--text3);display:block;margin-top:2px;font-family:'Space Mono',monospace;}
.sidebar-nav{flex:1;overflow-y:auto;padding:10px 8px;}
.nav-lbl{font-size:10px;font-weight:700;letter-spacing:.12em;color:var(--text3);padding:8px 10px 4px;text-transform:uppercase;}
.nav-btn{display:flex;align-items:center;gap:9px;width:100%;padding:9px 10px;background:none;border:none;border-radius:7px;color:var(--text2);font-family:'Noto Sans TC',sans-serif;font-size:13px;cursor:pointer;text-align:left;transition:all .15s;}
.nav-btn:hover{background:var(--surface2);color:var(--text);}
.nav-btn.active{background:rgba(245,158,11,.15);color:var(--accent2);}
.nav-btn .ic{font-size:15px;width:18px;text-align:center;}
.badge{margin-left:auto;background:var(--danger);color:#fff;font-size:10px;font-weight:700;padding:1px 6px;border-radius:20px;font-family:'Space Mono',monospace;}
.badge.warn{background:var(--warn);color:#000;}
.sidebar-foot{padding:12px 8px;border-top:1px solid var(--border);}
.main{flex:1;display:flex;flex-direction:column;overflow:hidden;}
.topbar{padding:13px 22px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:12px;background:var(--surface);}
.topbar h2{font-size:15px;font-weight:600;flex:1;}
.topbar-clock{font-family:'Space Mono',monospace;font-size:12px;color:var(--text3);}
.content{flex:1;overflow-y:auto;padding:20px 22px;}
/* STATS */
.stats-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:20px;}
.stat-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);padding:16px;}
.stat-card .lbl{font-size:11px;color:var(--text3);margin-bottom:5px;}
.stat-card .val{font-size:26px;font-weight:700;font-family:'Space Mono',monospace;}
.stat-card .sub{font-size:11px;color:var(--text2);margin-top:3px;}
.stat-card.acc .val{color:var(--accent2);}
.stat-card.dan .val{color:var(--danger);}
.stat-card.wrn .val{color:var(--warn);}
.stat-card.suc .val{color:var(--success);}
/* SECTION */
.sec{font-size:11px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:var(--text3);margin-bottom:10px;display:flex;align-items:center;gap:8px;}
.sec::after{content:'';flex:1;height:1px;background:var(--border);}
/* TABLE */
.tbl-wrap{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);overflow:hidden;margin-bottom:20px;}
table{width:100%;border-collapse:collapse;}
thead tr{border-bottom:1px solid var(--border);}
th{padding:9px 13px;font-size:11px;font-weight:700;letter-spacing:.06em;color:var(--text3);text-align:left;text-transform:uppercase;}
td{padding:9px 13px;border-bottom:1px solid var(--border);font-size:13px;color:var(--text2);}
tbody tr:last-child td{border-bottom:none;}
tbody tr:hover td{background:var(--surface2);}
.store-nm{color:var(--text);font-weight:500;}
/* PILLS */
.pill{display:inline-flex;align-items:center;gap:4px;padding:2px 8px;border-radius:20px;font-size:11px;font-weight:600;}
.pill.unr{background:rgba(239,68,68,.13);color:var(--danger);border:1px solid rgba(239,68,68,.28);}
.pill.rep{background:rgba(34,197,94,.1);color:var(--success);border:1px solid rgba(34,197,94,.22);}
.pill.wrn{background:rgba(245,158,11,.12);color:var(--warn);border:1px solid rgba(245,158,11,.28);}
/* LINK BTN */
.lbtn{display:inline-flex;align-items:center;gap:4px;padding:3px 9px;border-radius:6px;background:rgba(59,130,246,.12);color:var(--blue2);border:1px solid rgba(59,130,246,.28);font-size:11px;cursor:pointer;text-decoration:none;transition:all .15s;}
.lbtn:hover{background:rgba(59,130,246,.22);}
/* STARS */
.stars{display:flex;align-items:center;gap:2px;}
.si{font-size:13px;}
/* REVIEW CARDS */
.rev-grid{display:grid;gap:10px;}
.rev-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);padding:14px 16px;display:flex;gap:14px;transition:border-color .15s;}
.rev-card.low{border-left:3px solid var(--danger);}
.rev-card.mid{border-left:3px solid var(--warn);}
.rev-meta{min-width:155px;}
.rev-store{font-size:12px;font-weight:600;color:var(--accent2);margin-bottom:3px;}
.rev-author{font-size:12px;color:var(--text2);}
.rev-date{font-size:11px;color:var(--text3);margin-top:2px;font-family:'Space Mono',monospace;}
.rev-body{flex:1;}
.rev-txt{font-size:13px;color:var(--text);line-height:1.65;}
.rev-reply{margin-top:9px;background:var(--surface2);border:1px solid var(--border);border-radius:7px;padding:9px 12px;font-size:12px;color:var(--text2);line-height:1.5;font-style:italic;}
.rev-reply .rl{font-size:10px;color:var(--text3);margin-bottom:3px;text-transform:uppercase;letter-spacing:.05em;font-style:normal;}
/* ALARM */
.alarm-bar{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);padding:14px 16px;display:flex;align-items:center;gap:14px;flex-wrap:wrap;margin-bottom:20px;}
.alarm-bar .ai{font-size:22px;}
.alarm-bar .info{flex:1;}
.alarm-bar .info h3{font-size:13px;font-weight:600;}
.alarm-bar .info p{font-size:12px;color:var(--text3);margin-top:2px;}
.time-chip{font-family:'Space Mono',monospace;font-size:20px;font-weight:700;color:var(--warn);padding:5px 13px;background:rgba(245,158,11,.08);border:1px solid rgba(245,158,11,.22);border-radius:8px;}
.toggle{display:flex;align-items:center;gap:8px;padding:7px 13px;border-radius:7px;background:rgba(34,197,94,.1);border:1px solid rgba(34,197,94,.28);color:var(--success);font-size:12px;font-weight:600;cursor:pointer;}
.toggle.off{background:var(--surface2);border-color:var(--border);color:var(--text3);}
/* ALERT PANEL */
.alert-pnl{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);overflow:hidden;margin-bottom:20px;}
.alert-hdr{padding:11px 15px;background:rgba(239,68,68,.07);border-bottom:1px solid rgba(239,68,68,.18);display:flex;align-items:center;gap:8px;}
.alert-hdr h3{font-size:13px;font-weight:600;color:var(--danger);flex:1;}
.alert-item{padding:10px 15px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:11px;}
.alert-item:last-child{border-bottom:none;}
.adot{width:6px;height:6px;border-radius:50%;background:var(--danger);flex-shrink:0;}
.atxt{flex:1;font-size:13px;}
.atxt strong{color:var(--text);}
/* MODAL */
.overlay{position:fixed;inset:0;background:rgba(0,0,0,.72);display:flex;align-items:center;justify-content:center;z-index:100;backdrop-filter:blur(4px);}
.modal{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:22px;width:460px;max-width:90vw;}
.modal h3{font-size:15px;font-weight:600;margin-bottom:3px;}
.modal p{font-size:12px;color:var(--text3);margin-bottom:18px;}
.fg{margin-bottom:13px;}
.fg label{display:block;font-size:12px;color:var(--text2);margin-bottom:5px;font-weight:500;}
.fg input,.fg select,.fg textarea{width:100%;padding:8px 11px;background:var(--surface2);border:1px solid var(--border);border-radius:7px;color:var(--text);font-family:'Noto Sans TC',sans-serif;font-size:13px;outline:none;transition:border-color .15s;resize:vertical;}
.fg input:focus,.fg select:focus,.fg textarea:focus{border-color:var(--accent);}
.btn{padding:8px 17px;border-radius:7px;border:none;cursor:pointer;font-family:'Noto Sans TC',sans-serif;font-size:13px;font-weight:600;transition:all .15s;}
.btn-p{background:var(--accent);color:#000;}
.btn-p:hover{background:var(--accent2);}
.btn-g{background:var(--surface2);color:var(--text2);border:1px solid var(--border);}
.btn-g:hover{color:var(--text);}
.mfoot{display:flex;gap:8px;justify-content:flex-end;margin-top:18px;}
/* STAR INPUT */
.star-inp{display:flex;gap:6px;margin-bottom:4px;}
.ss{font-size:22px;cursor:pointer;color:var(--border);transition:color .1s;}
.ss.on{color:var(--star);}
/* TOAST */
.toast{position:fixed;bottom:22px;right:22px;background:rgba(30,35,50,.97);border:1px solid var(--border);border-left:3px solid var(--danger);color:#fff;border-radius:10px;padding:13px 17px;font-size:13px;box-shadow:0 4px 24px rgba(0,0,0,.5);z-index:200;display:none;max-width:320px;}
.toast.show{display:block;animation:si .3s ease;}
.toast .tt{font-size:14px;font-weight:700;margin-bottom:3px;}
.toast .ts{font-size:12px;opacity:.8;}
.toast.ok{border-left-color:var(--success);}
@keyframes si{from{transform:translateY(14px);opacity:0}to{transform:translateY(0);opacity:1}}
/* SCROLLBAR */
::-webkit-scrollbar{width:5px;}
::-webkit-scrollbar-track{background:var(--bg);}
::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px;}
/* TABS */
.tabs{display:flex;gap:4px;margin-bottom:13px;}
.tab{padding:5px 13px;border-radius:6px;border:none;background:none;color:var(--text3);font-family:'Noto Sans TC',sans-serif;font-size:13px;cursor:pointer;transition:all .15s;}
.tab.on{background:var(--surface);color:var(--text);border:1px solid var(--border);}
/* empty */
.empty{text-align:center;padding:40px;color:var(--text3);}
.empty .ei{font-size:34px;margin-bottom:10px;}
/* number input */
input[type=number]{-moz-appearance:textfield;}
input[type=number]::-webkit-outer-spin-button,
input[type=number]::-webkit-inner-spin-button{-webkit-appearance:none;margin:0;}
/* LINE */
.line-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);overflow:hidden;margin-bottom:12px;}
.line-card-hdr{padding:11px 15px;display:flex;align-items:center;gap:10px;border-bottom:1px solid var(--border);background:rgba(0,195,0,.05);}
.line-card-hdr .ln{font-size:16px;}
.line-card-hdr h4{font-size:13px;font-weight:600;flex:1;}
.line-status{font-size:11px;font-weight:600;padding:2px 8px;border-radius:20px;}
.line-status.set{background:rgba(34,197,94,.13);color:var(--success);border:1px solid rgba(34,197,94,.25);}
.line-status.unset{background:rgba(148,163,184,.1);color:var(--text3);border:1px solid var(--border);}
.line-card-body{padding:13px 15px;display:flex;gap:9px;align-items:center;}
.line-card-body input{flex:1;padding:7px 10px;background:var(--surface2);border:1px solid var(--border);border-radius:7px;color:var(--text);font-family:'Space Mono',monospace;font-size:12px;outline:none;transition:border-color .15s;}
.line-card-body input:focus{border-color:#00c300;}
.line-card-body input::placeholder{color:var(--text3);font-size:11px;}
.btn-line{padding:7px 13px;border-radius:7px;border:none;cursor:pointer;font-family:'Noto Sans TC',sans-serif;font-size:12px;font-weight:600;background:#00b900;color:#fff;transition:all .15s;}
.btn-line:hover{background:#00c900;}
.btn-line-ghost{padding:7px 11px;border-radius:7px;border:1px solid rgba(0,185,0,.3);cursor:pointer;font-size:12px;background:rgba(0,185,0,.08);color:#00b900;font-family:'Noto Sans TC',sans-serif;transition:all .15s;}
.btn-line-ghost:hover{background:rgba(0,185,0,.15);}
.send-log{margin-top:8px;background:var(--surface2);border:1px solid var(--border);border-radius:7px;padding:10px 13px;max-height:160px;overflow-y:auto;}
.log-row{font-size:11px;font-family:'Space Mono',monospace;color:var(--text2);padding:2px 0;border-bottom:1px solid var(--border);}
.log-row:last-child{border-bottom:none;}
.log-row.ok{color:var(--success);}
.log-row.err{color:var(--danger);}
</style>
</head>
<body>
<div class="app">
<!-- SIDEBAR -->
<aside class="sidebar">
  <div class="logo">
    <h1>🍲 鍋泰暖</h1>
    <span>評論監控系統</span>
  </div>
  <nav class="sidebar-nav">
    <div class="nav-lbl">主選單</div>
    <button class="nav-btn active" onclick="go('dash')"><span class="ic">📊</span><span>總覽儀表板</span></button>
    <button class="nav-btn" onclick="go('stores')"><span class="ic">🏪</span><span>門店管理</span></button>
    <button class="nav-btn" onclick="go('reviews')"><span class="ic">💬</span><span>所有評論</span><span class="badge" id="b-unr">0</span></button>
    <button class="nav-btn" onclick="go('alerts')"><span class="ic">🔔</span><span>低分提醒</span><span class="badge warn" id="b-low">0</span></button>
    <div class="nav-lbl" style="margin-top:8px">設定</div>
    <button class="nav-btn" onclick="go('settings')"><span class="ic">⚙️</span><span>提醒設定</span></button>
    <button class="nav-btn" onclick="go('line')"><span class="ic">💚</span><span>Line 提醒設定</span></button>
    <button class="nav-btn" onclick="go('weekly')"><span class="ic">📈</span><span>週報 / 四週評分</span></button>
  </nav>
  <div class="sidebar-foot">
    <button class="btn btn-g" style="width:100%;font-size:12px;" onclick="openAddRev()">＋ 新增評論</button>
  </div>
</aside>
<!-- MAIN -->
<main class="main">
  <div class="topbar">
    <h2 id="page-title">總覽儀表板</h2>
    <div class="topbar-clock" id="clock">--:--:--</div>
    <button class="btn btn-p" style="font-size:12px;" onclick="refresh()">🔄 更新</button>
  </div>
  <div class="content" id="content"></div>
</main>
</div>

<!-- ADD REVIEW MODAL -->
<div class="overlay" id="rev-modal" style="display:none">
  <div class="modal">
    <h3>新增評論記錄</h3>
    <p>手動輸入從 Google Maps 抄錄的評論</p>
    <div class="fg"><label>門店 *</label><select id="r-store"></select></div>
    <div class="fg"><label>評論者名稱</label><input id="r-author" placeholder="例：王小明"/></div>
    <div class="fg">
      <label>星數評分 *</label>
      <div class="star-inp" id="star-inp">
        <span class="ss" data-v="1" onclick="setStar(1)">★</span>
        <span class="ss" data-v="2" onclick="setStar(2)">★</span>
        <span class="ss" data-v="3" onclick="setStar(3)">★</span>
        <span class="ss" data-v="4" onclick="setStar(4)">★</span>
        <span class="ss" data-v="5" onclick="setStar(5)">★</span>
      </div>
    </div>
    <div class="fg"><label>評論內容</label><textarea id="r-txt" rows="3" placeholder="評論文字（可留空）"></textarea></div>
    <div class="fg"><label>評論日期</label><input id="r-date" type="date"/></div>
    <div class="fg"><label>回覆狀態</label>
      <select id="r-rep"><option value="0">尚未回覆</option><option value="1">已回覆</option></select>
    </div>
    <div class="mfoot">
      <button class="btn btn-g" onclick="closeModal('rev-modal')">取消</button>
      <button class="btn btn-p" onclick="addRev()">新增評論</button>
    </div>
  </div>
</div>

<!-- TOAST -->
<div class="toast" id="toast"><div class="tt" id="t-ttl"></div><div class="ts" id="t-sub"></div></div>

<script>
// ── STATE ──
const SK = 'gtw_v3';
let curView = 'dash', selStar = 0;
let alarmOn = true, alarmH = 21, alarmM = 50;
let lastAlarmDate = '';
// globalLineToken: 總部統一 Token（可在設定頁設定）
let globalLineToken = '';
let globalLineGroupId = ''; // Line Group/Room ID

// Real store data — lineToken 各門店可獨立設定 Line Notify Token
const DEFAULT_STORES = [
  {id:1, name:'彰化員林初始店', region:'彰化', link:'https://maps.app.goo.gl/YuanlinStore', mapsId:'ChIJbavd6fg3aTQR5hMU5gekxyo', rating:4.8, ratingCount:5180, lineToken:''},
  {id:2, name:'桃園中壢店',     region:'桃園', link:'https://maps.app.goo.gl/ZhongliStore',  mapsId:'ChIJ1fSYSgcjaDQRoUvZ_2IQl8k', rating:4.9, ratingCount:1779, lineToken:''},
  {id:3, name:'台中崇德店',     region:'台中', link:'https://maps.app.goo.gl/ChongdeStore',  mapsId:'ChIJKxQ-X2wXaTQRsX6ns-3k13s', rating:4.8, ratingCount:4991, lineToken:''},
  {id:4, name:'台中大里店',     region:'台中', link:'https://maps.app.goo.gl/DaliStore',     mapsId:'ChIJG_RnPxA9aTQR70aikPM7D2o', rating:4.8, ratingCount:2015, lineToken:''},
  {id:5, name:'台中豐原店',     region:'台中', link:'https://maps.app.goo.gl/FengyuanStore', mapsId:'ChIJmVN4OwARaTQR0O5BZTtIWhU', rating:4.7, ratingCount:503,  lineToken:''},
  {id:6, name:'新北土城店',     region:'新北', link:'https://www.google.com/maps/place/?q=place_id:ChIJWf0JXAAdaDQRKtqqLGpRaqk', mapsId:'ChIJWf0JXAAdaDQRKtqqLGpRaqk', rating:4.7, ratingCount:106, lineToken:''},
];

function loadData() {
  const raw = localStorage.getItem(SK);
  if (raw) return JSON.parse(raw);
  return {
    stores: DEFAULT_STORES,
    reviews: [
      {id:1,  storeId:1, author:'林先生', stars:5, txt:'冬蔭功湯底超棒！酸辣很到位，肉質新鮮，下次還要來。',      date:'2025-06-10', replied:true,  replyTxt:'謝謝您的支持！歡迎再度光臨 🙏'},
      {id:2,  storeId:1, author:'陳小姐', stars:2, txt:'等位等了快一小時，服務生態度有點差，有點失望。',         date:'2025-06-12', replied:false},
      {id:3,  storeId:1, author:'黃先生', stars:4, txt:'整體不錯，停車比較麻煩，希望可以改善。',                date:'2025-06-13', replied:true,  replyTxt:'感謝建議，我們會持續改善停車引導！'},
      {id:4,  storeId:2, author:'王小明', stars:1, txt:'桌子不乾淨，服務人員不理人，完全不想再來了。',          date:'2025-06-11', replied:false},
      {id:5,  storeId:2, author:'李美花', stars:5, txt:'食材非常新鮮！椰奶湯底好喝到不行，一定會再來！',        date:'2025-06-14', replied:true,  replyTxt:'謝謝您❤️ 期待您的再次光臨！'},
      {id:6,  storeId:3, author:'張大偉', stars:3, txt:'口味還行，但份量感覺越來越少了。',                      date:'2025-06-12', replied:false},
      {id:7,  storeId:3, author:'劉美華', stars:5, txt:'推薦！環境好、食材新鮮，服務也很親切！',               date:'2025-06-13', replied:false},
      {id:8,  storeId:3, author:'吳志文', stars:4, txt:'很好吃，榴槤冰淇淋是亮點，下次還要帶朋友來！',         date:'2025-06-14', replied:true,  replyTxt:'謝謝您的推薦，榴槤冰淇淋是我們的招牌❤️'},
      {id:9,  storeId:4, author:'林太太', stars:2, txt:'點了套餐結果等了超久，中間服務生還搞錯餐點。',          date:'2025-06-10', replied:false},
      {id:10, storeId:4, author:'陳先生', stars:5, txt:'南洋風味道地，湯頭很濃郁，食材也很新鮮！',             date:'2025-06-11', replied:true,  replyTxt:'感謝您！我們用心熬製的湯頭終於被看見了 😊'},
      {id:11, storeId:5, author:'趙小姐', stars:3, txt:'在家樂福裡面，空間比較小，但湯底很不錯。',             date:'2025-06-13', replied:false},
      {id:12, storeId:5, author:'周先生', stars:4, txt:'CP值不錯！松露泰式鍋底很香，下次還要來！',             date:'2025-06-14', replied:false},
    ],
    nextId: 13,
  };
}
function save(d){
  // persist globalLineToken alongside data
  const payload = Object.assign({}, d, {_globalLineToken: globalLineToken, _globalLineGroupId: globalLineGroupId});
  localStorage.setItem(SK, JSON.stringify(payload));
}
function loadGlobalToken(){
  const raw = localStorage.getItem(SK);
  if(raw){ const p=JSON.parse(raw); if(p._globalLineToken) globalLineToken=p._globalLineToken;
    if(p._globalLineGroupId) globalLineGroupId=p._globalLineGroupId; }
}

// ── UTILS ──
function stars(n, sz='13px'){
  return `<div class="stars">${[1,2,3,4,5].map(i=>`<span class="si" style="color:${i<=n?'#fbbf24':'#2d3452'};font-size:${sz}">★</span>`).join('')}</div>`;
}
function store(id){ return D.stores.find(s=>s.id===id); }
function storeStats(sid){
  const rs = D.reviews.filter(r=>r.storeId===sid);
  const unr = rs.filter(r=>!r.replied);
  const lowUnr = rs.filter(r=>r.stars<=3&&!r.replied);
  const avg = rs.length ? (rs.reduce((a,r)=>a+r.stars,0)/rs.length).toFixed(1) : '-';
  return {rs, unr, lowUnr, avg};
}
function fmtDate(s){ return s ? s.replace(/-/g,'/') : '-'; }
function toast(ttl, sub, ok=false){
  const t=document.getElementById('toast');
  document.getElementById('t-ttl').textContent=ttl;
  document.getElementById('t-sub').textContent=sub;
  t.classList.toggle('ok', ok);
  t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'), 4500);
}
function badges(){
  const unr = D.reviews.filter(r=>!r.replied).length;
  const low = D.reviews.filter(r=>r.stars<=3&&!r.replied).length;
  document.getElementById('b-unr').textContent=unr;
  document.getElementById('b-low').textContent=low;
}

// ── CLOCK + ALARM ──
function tick(){
  const now = new Date();
  const hh=String(now.getHours()).padStart(2,'0'),
        mm=String(now.getMinutes()).padStart(2,'0'),
        ss=String(now.getSeconds()).padStart(2,'0');
  document.getElementById('clock').textContent=`${hh}:${mm}:${ss}`;
  const today=`${now.getFullYear()}-${now.getMonth()}-${now.getDate()}`;
  checkWeeklyReport();
  if(alarmOn && now.getHours()===alarmH && now.getMinutes()===alarmM && today!==lastAlarmDate){
    lastAlarmDate=today; fireAlarm();
  }
}
setInterval(tick,1000); tick();

async function fireAlarm(){
  const items = D.reviews.filter(r=>r.stars<=3&&!r.replied);
  if(!items.length){ toast('✅ 今日無低分未回覆評論','',true); return; }
  const names = [...new Set(items.map(r=>store(r.storeId)?.name))].filter(Boolean);
  toast(`⚠️ ${items.length} 則低分評論尚未回覆`, names.slice(0,3).join('、')+(names.length>3?`…等 ${names.length} 間`:''), false);
  // Also fire Line Notify
  const sent = await fireLineAlerts();
  if(sent>0) toast(`💚 Line 提醒已發送至 ${sent} 個群組`,'',true);
}

// ── VIEWS ──
function go(v){
  curView=v;
  document.querySelectorAll('.nav-btn').forEach(b=>b.classList.remove('active'));
  const map={dash:0,stores:1,reviews:2,alerts:3,settings:4};
  const btns=document.querySelectorAll('.nav-btn');
  if(btns[map[v]]) btns[map[v]].classList.add('active');
  const titles={dash:'總覽儀表板',stores:'門店管理',reviews:'所有評論',alerts:'低分提醒',settings:'提醒設定',line:'Line 提醒設定',weekly:'週報 — 四週評分趨勢'};
  document.getElementById('page-title').textContent=titles[v]||v;
  const el=document.getElementById('content');
  if(v==='dash') renderDash(el);
  else if(v==='stores') renderStores(el);
  else if(v==='reviews') renderReviews(el);
  else if(v==='alerts') renderAlerts(el);

  else if(v==='weekly') renderWeekly(el);
}

// ── Build notification message ──
function buildGlobalMsg(){
  const today = new Date().toLocaleDateString('zh-TW',{month:'2-digit',day:'2-digit'});
  const allLow = D.reviews.filter(r=>r.stars<=3&&!r.replied);
  if(!allLow.length){
    return `✅ 鍋泰暖 ${today} 每日報告\n所有門店低分評論均已回覆，一切正常！`;
  }
  let msg=`⚠️ 鍋泰暖每日評論報告\n${today} — 共 ${allLow.length} 則低分未回覆\n─────────────────\n`;
  D.stores.forEach(s=>{
    const items=allLow.filter(r=>r.storeId===s.id);
    if(!items.length) return;
    msg+=`\n🏪 ${s.name}（${items.length}則）\n`;
    items.forEach((r,i)=>{
      const st='★'.repeat(r.stars)+'☆'.repeat(5-r.stars);
      const snip=r.txt?(r.txt.length>22?r.txt.slice(0,22)+'…':r.txt):'無文字評論';
      msg+=`  ${i+1}. ${st} ${r.author||'匿名'}\n     「${snip}」\n`;
    });
  });
  msg+='─────────────────\n請各門店盡快回覆 Google 評論！';
  return msg;
}

// ── Messaging API push via Google Apps Script proxy ──
const GAS_PROXY = 'https://script.google.com/macros/s/AKfycbwnzIG1UAmLkac8NOirmsuYhJkNEAF-R3yHCyOSlD9mcweEH0zJ6hyYLcSzENaXjIDOKQ/exec';

async function lineMessagingSend(message){
  if(!globalLineToken||!globalLineGroupId) return false;
  try{
    const res = await fetch(GAS_PROXY, {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({
        token:   globalLineToken,
        groupId: globalLineGroupId,
        message: message
      })
    });
    const data = await res.json().catch(()=>({ok:false}));
    return data.ok === true;
  }catch(e){ return false; }
}

// Runs every Wednesday; calculates avg star rating for reviews from the past 4 weeks (rolling from last Tuesday)
function getWeeklyWindow(){
  // anchor: last Tuesday (or today if today is Tuesday)
  const now = new Date();
  const day = now.getDay(); // 0=Sun,1=Mon,2=Tue,3=Wed,4=Thu,5=Fri,6=Sat
  const daysToLastTue = day >= 2 ? day - 2 : day + 5;
  const anchor = new Date(now);
  anchor.setDate(now.getDate() - daysToLastTue);
  anchor.setHours(23,59,59,0);
  const start = new Date(anchor);
  start.setDate(anchor.getDate() - 27); // 4 weeks = 28 days back from anchor
  start.setHours(0,0,0,0);
  return { start, end: anchor };
}

function calcWeeklyStats(){
  const {start, end} = getWeeklyWindow();
  const startStr = start.toISOString().slice(0,10);
  const endStr   = end.toISOString().slice(0,10);
  const result = {};
  D.stores.forEach(s=>{
    const rs = D.reviews.filter(r=>{
      if(r.storeId!==s.id) return false;
      if(!r.date) return false;
      return r.date >= startStr && r.date <= endStr;
    });
    const total = rs.length;
    const avg   = total ? (rs.reduce((a,r)=>a+r.stars,0)/total) : null;
    const low   = rs.filter(r=>r.stars<=3).length;
    const unr   = rs.filter(r=>!r.replied).length;
    result[s.id] = { total, avg, low, unr, reviews: rs };
  });
  return { result, startStr, endStr };
}

// Per-week breakdown (4 individual weeks)
function calcFourWeeks(){
  const now = new Date();
  const day = now.getDay();
  const daysToLastTue = day >= 2 ? day - 2 : day + 5;
  const anchor = new Date(now);
  anchor.setDate(now.getDate() - daysToLastTue);

  const weeks = [];
  for(let w=3; w>=0; w--){
    const wEnd = new Date(anchor);
    wEnd.setDate(anchor.getDate() - w*7);
    wEnd.setHours(23,59,59,0);
    const wStart = new Date(wEnd);
    wStart.setDate(wEnd.getDate() - 6);
    wStart.setHours(0,0,0,0);
    const ws = wStart.toISOString().slice(0,10);
    const we = wEnd.toISOString().slice(0,10);
    const label = `${ws.slice(5).replace('-','/')}～${we.slice(5).replace('-','/')}`;
    const storeData = {};
    D.stores.forEach(s=>{
      const rs = D.reviews.filter(r=>r.storeId===s.id && r.date>=ws && r.date<=we);
      storeData[s.id] = rs.length ? (rs.reduce((a,r)=>a+r.stars,0)/rs.length) : null;
    });
    weeks.push({label, ws, we, storeData});
  }
  return weeks;
}

function checkWeeklyReport(){

  if(now.getDay()!==3) return; // only Wednesday
  if(now.getHours()!==9||now.getMinutes()!==0) return;
  const today=now.toISOString().slice(0,10);
  if(today===lastWeeklyDate) return;
  lastWeeklyDate=today;
  sendWeeklyReport();
}


// ── INIT ──
loadGlobalToken(); badges(); go('dash');
</script>
